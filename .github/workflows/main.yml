name: Build patched Windows

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: Flutter version
        required: false
        default: "3.35.7"
        type: string
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

env:
  SOURCE_DIR: kelivo-src
  UPSTREAM_REPO: Chevey339/kelivo
  FLUTTER_VERSION: ${{ inputs.flutter_version || '3.35.7' }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v6

      - name: Get upstream version
        id: upstream_version
        shell: bash
        env:
          OWNER_REPO: ${{ env.UPSTREAM_REPO }}
        run: |
          tag=$(sh ./get_latest_version.sh)
          if [ -z "$tag" ]; then
            echo "ERROR: upstream version tag is empty" >&2
            exit 1
          fi

          safe_tag=$(printf '%s' "$tag" | sed 's#[^A-Za-z0-9._-]#_#g')
          echo "VERSION_TAG=$tag" >> "$GITHUB_ENV"
          echo "VERSION_SAFE=$safe_tag" >> "$GITHUB_ENV"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "safe_tag=$safe_tag" >> "$GITHUB_OUTPUT"
          echo "Upstream version tag: $tag"

      - name: Check current repository release
        id: current_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.upstream_version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG already exists in $GITHUB_REPOSITORY. Skip download and build."
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG does not exist in $GITHUB_REPOSITORY. Continue build."
          fi

      - name: Skip existing release
        if: ${{ steps.current_release.outputs.skip_build == 'true' }}
        shell: bash
        run: echo "Current repository already has release $VERSION_TAG. Nothing to build."

      - name: Install CMake
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        uses: lukka/get-cmake@latest

      - name: Install Flutter
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Download latest Kelivo source and apply patch
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        shell: bash
        env:
          OWNER_REPO: ${{ env.UPSTREAM_REPO }}
          VERSION_TAG: ${{ steps.upstream_version.outputs.tag }}
        run: sh ./download_and_patch.sh

      - name: Inject fallback
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Get dependencies
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        working-directory: ${{ env.SOURCE_DIR }}
        run: flutter pub get

      - name: Check CMake version
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: cmake --version

      - name: Build Windows
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        working-directory: ${{ env.SOURCE_DIR }}
        run: flutter build windows --release

      - name: Pack portable ZIP
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "../Kelivo_windows_$env:VERSION_SAFE.zip" -Force

      - name: Publish ZIP to release
        if: ${{ steps.current_release.outputs.skip_build != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.upstream_version.outputs.tag }}
          name: ${{ steps.upstream_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: Kelivo_windows_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
