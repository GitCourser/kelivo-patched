name: Build patched Windows

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: Flutter version
        required: false
        default: "3.35.7"
        type: string
      publish_release:
        description: Upload artifacts to this repository release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag in this repository, required when publishing
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  SOURCE_DIR: kelivo-src

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Download latest Kelivo source and apply patch
        shell: bash
        run: sh ./download_and_patch.sh

      - name: Inject fallback
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Get dependencies
        working-directory: ${{ env.SOURCE_DIR }}
        run: flutter pub get

      - name: Check CMake version
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: cmake --version

      - name: Read version
        id: version
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern "^version:" | ForEach-Object { $_.Line.Split(":")[1].Trim() })
          $safeVersion = $version -replace '\+', '_'
          echo "VERSION=$safeVersion" >> $env:GITHUB_ENV
          echo "version=$safeVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $safeVersion"

      - name: Build Windows
        working-directory: ${{ env.SOURCE_DIR }}
        run: flutter build windows --release

      - name: Pack portable ZIP
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "../Kelivo_windows_$env:VERSION.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          $issContent = @"
          #define MyAppName "Kelivo"
          #define MyAppVersion "$env:VERSION"
          #define MyAppPublisher "Psyche"
          #define MyAppExeName "kelivo.exe"

          [Setup]
          AppId={{A7B8C9D0-E1F2-4A5B-8C9D-0E1F2A3B4C5D}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=..
          OutputBaseFilename=Kelivo_windows_{#MyAppVersion}_setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64
          ArchitecturesAllowed=x64
          UninstallDisplayIcon={app}\{#MyAppExeName}

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent
          "@

          $issContent | Out-File -FilePath "installer.iss" -Encoding utf8BOM
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kelivo-Windows-${{ steps.version.outputs.version }}
          path: |
            Kelivo_windows_*.zip
            Kelivo_windows_*_setup.exe

      - name: Publish to release
        if: ${{ inputs.publish_release && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          files: |
            Kelivo_windows_*.zip
            Kelivo_windows_*_setup.exe
